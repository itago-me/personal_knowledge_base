# 模型配置
embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"  # 将文本转为向量的模型，这个模型支持中文
llm_model: "gpt-3.5-turbo"  # 生成回答的大模型，这里先用OpenAI的，后面可以换成免费的本地模型

# 向量数据库配置
chroma:
  persist_directory: "./data/chroma_db"  # 向量数据库存在哪里
  collection_name: "knowledge_base"      # 这个知识库的名字

# 文档处理配置
chunk_size: 500      # 把长文档切成多长的片段（字符数）
chunk_overlap: 50    # 相邻片段重叠多少字（避免关键信息被切散）

# API配置（如果你用OpenAI，需要填key；目前可以先空着，后面我们可能先用本地模型）
openai:
  api_key: "${OPENAI_API_KEY}"  # 从系统环境变量读取，这样不会把key写在代码里
